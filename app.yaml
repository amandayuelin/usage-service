name: usage-events-app
services:
  - name: web
    github:
      repo: amandayuelin/usage-service
      branch: main
      deploy_on_push: true
    run_command: sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'
    envs:
      - key: DATABASE_URL
        value: sqlite:///./data.db
      - key: PORT
        value: "8000"
